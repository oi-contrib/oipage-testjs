<!DOCTYPE html>
<html lang="zh-cn">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>单元测试</title>
    <script src="../dist/test.js"></script>
</head>

<body>
    <script type="module">
        let ut = new testjs.UnitTest({
            lifecycle: {
                beforeAll: () => {
                    console.log("> 单元测试：所有测试开始前运行")
                },
                beforeEach: (data) => {
                    console.log(`> 单元测试：测试套件开始前运行`, data)
                },
                beforeItem: (data) => {
                    console.log(`> 单元测试：测试用例开始前运行`, data)
                },
                afterItem: (data) => {
                    console.log(`> 单元测试：测试用例结束后运行`, data)
                },
                afterEach: (data) => {
                    console.log(`> 单元测试：测试套件结束后运行`, data)
                }
            }
        })

        ut.describe("测试加法运算", () => {
            ut.it("1+1=2", () => {
                ut.expect(1 + 1).toBe(2)
            })

            ut.it("2+2=4", () => {
                ut.expect(2 + 2).toBe(4)
            })
        })

    </script>

</body>

</html>
